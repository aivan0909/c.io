<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shunbao - 順寶投資大師</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            light: '#1e293b',
                            accent: '#38bdf8',
                            success: '#22c55e',
                            danger: '#ef4444'
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-brand-light/50 backdrop-blur-md border border-white/10 rounded-xl p-6 shadow-xl;
            }
            .input-field {
                @apply bg-brand-dark/50 border border-white/10 rounded-lg px-4 py-3 w-full focus:outline-none focus:border-brand-accent transition-colors text-white placeholder-gray-500;
            }
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('analysis');
            const [stockCode, setStockCode] = useState('');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState('');

            const [scanResults, setScanResults] = useState([]);
            const [scanLoading, setScanLoading] = useState(false);
            const [filters, setFilters] = useState({ min: 0, max: 2000, strategy: 'ALL' });

            // Volume Monitor States
            const [volumeResults, setVolumeResults] = useState([]);
            const [volumeLoading, setVolumeLoading] = useState(false);
            const [volumeThreshold, setVolumeThreshold] = useState(400);
            const [volumeFilter, setVolumeFilter] = useState('');

            const filteredVolumeResults = volumeResults.filter(item =>
                item.stock_code.includes(volumeFilter) || item.stock_name.includes(volumeFilter)
            );

            const handleAnalyze = async (e) => {
                if (e) e.preventDefault();
                if (!stockCode) return;
                setLoading(true);
                setError('');
                setData(null);
                try {
                    const response = await fetch(`/api/analyze/${stockCode}`);
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.detail || 'Analysis failed');
                    }
                    const result = await response.json();
                    setData(result);
                    setView('analysis'); // Ensure view is analysis
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleScan = async () => {
                setScanLoading(true);
                try {
                    const params = new URLSearchParams({
                        min_price: filters.min,
                        max_price: filters.max,
                        strategy: filters.strategy
                    });
                    const response = await fetch(`/api/scan?${params}`);
                    const result = await response.json();
                    // Sort by stock_code
                    const sortedResults = result.results.sort((a, b) => a.stock_code.localeCompare(b.stock_code));
                    setScanResults(sortedResults);
                } catch (err) {
                    console.error("Scan failed", err);
                } finally {
                    setScanLoading(false);
                }
            };

            // Fetch volume data (can be called manually or via interval)
            const fetchVolumeData = async () => {
                try {
                    const response = await fetch(`/api/volume_monitor?threshold=${volumeThreshold}`);
                    const result = await response.json();
                    setVolumeResults(result.results);
                } catch (err) {
                    console.error("Volume monitor auto-refresh failed", err);
                }
            };

            // Auto-refresh logic for Volume Monitor
            useEffect(() => {
                let intervalId;
                if (view === 'volume_monitor') {
                    // Initial fetch when switching to the view (if empty)
                    if (volumeResults.length === 0) {
                        setVolumeLoading(true);
                        fetchVolumeData().finally(() => setVolumeLoading(false));
                    }

                    // Set interval to refresh every 60 seconds (60000 ms)
                    intervalId = setInterval(() => {
                        console.log("Auto-refreshing volume data...");
                        fetchVolumeData();
                    }, 60000);
                }

                return () => {
                    if (intervalId) clearInterval(intervalId);
                };
            }, [view, volumeThreshold]); // Re-run effect if view or threshold changes

            const handleVolumeMonitor = async (e) => {
                if (e) e.preventDefault();
                setVolumeLoading(true);
                await fetchVolumeData();
                setVolumeLoading(false);
            };

            const loadAnalysisFromScan = (code) => {
                setStockCode(code);
                setView('analysis');
            };

            const handleGeneratePrompt = () => {
                if (!data) return;
                const prompt = `**角色設定**：
你是一位精通台股技術分析的資深交易員「順寶」，擅長使用移動平均線(MA)、RSI及MACD進行短線與波段操作。

**輸入數據**：
- **股票代號**：${data.stock_code}
- **當前股價**：${data.current_price}
- **技術指標數據**：
    - MA(短天期): ${data.indicators.MA_Short}
    - MA(長天期): ${data.indicators.MA_Long}
    - RSI(14): ${data.indicators.RSI}
    - MACD: ${data.indicators.MACD}
    - MACD Signal: ${data.indicators.MACD_Signal}

**綜合策略信號**：${data.strategy_summary.replace('Comprehensive Strategy: ', '')}

**任務**：
1. 請根據上述指標數據，分析該股票當前的多空趨勢。
2. 解釋為何觸發了該信號（例如：因為發生黃金交叉且RSI低於30...）。
3. 給出具體的操作建議（包括建議的進場點、止損點約在多少價位，假設支撐壓力位...）。
4. 如果信號為 HOLD，請說明需等待什麼樣的訊號出現才行動。`;

                navigator.clipboard.writeText(prompt).then(() => {
                    alert('AI 監控 Prompt 已複製到剪貼簿！請貼上至 ChatGPT / Gemini 使用。');
                });
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-12 text-center">
                        <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-accent to-purple-400 mb-4 tracking-tight">
                            <i className="fa-solid fa-chart-line mr-4 text-brand-accent"></i>
                            順寶 Shunbao
                        </h1>
                        <p className="text-slate-400 text-lg">資深台股自動化投資分析與策略平台</p>
                    </header>

                    {/* Navigation */}
                    <nav className="max-w-6xl mx-auto mb-8 flex justify-center gap-4">
                        <button
                            onClick={() => setView('analysis')}
                            className={`px-6 py-2 rounded-full font-bold transition-all ${view === 'analysis' ? 'bg-brand-accent text-slate-900' : 'bg-white/10 text-slate-400 hover:bg-white/20'}`}
                        >
                            <i className="fa-solid fa-magnifying-glass-chart mr-2"></i>
                            個股分析
                        </button>
                        <button
                            onClick={() => setView('scanner')}
                            className={`px-6 py-2 rounded-full font-bold transition-all ${view === 'scanner' ? 'bg-brand-accent text-slate-900' : 'bg-white/10 text-slate-400 hover:bg-white/20'}`}
                        >
                            <i className="fa-solid fa-filter mr-2"></i>
                            市場掃描
                        </button>
                        <button
                            onClick={() => setView('volume_monitor')}
                            className={`px-6 py-2 rounded-full font-bold transition-all ${view === 'volume_monitor' ? 'bg-brand-accent text-slate-900' : 'bg-white/10 text-slate-400 hover:bg-white/20'}`}
                        >
                            <i className="fa-solid fa-bolt mr-2 text-yellow-500"></i>
                            爆量監控
                        </button>
                    </nav>

                    <main className="max-w-4xl mx-auto">
                        {view === 'analysis' && (
                            <div className="animate-fade-in space-y-6">
                                {/* Search Section */}
                                <div className="glass-panel mb-8 transform hover:scale-[1.01] transition-transform duration-300">
                                    <form onSubmit={handleAnalyze} className="flex flex-col md:flex-row gap-4 items-center">
                                        <div className="relative w-full md:flex-1">
                                            <input
                                                type="text"
                                                value={stockCode}
                                                onChange={(e) => setStockCode(e.target.value)}
                                                placeholder="輸入台股代號 (例如: 2330) 或 名稱 (例如: 台積電)"
                                                className="input-field pr-12"
                                            />
                                            <i className="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                        </div>
                                        <button
                                            type="submit"
                                            disabled={loading}
                                            className="w-full md:w-auto bg-brand-accent hover:bg-sky-400 text-slate-900 font-bold py-3 px-8 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-sky-500/20"
                                        >
                                            {loading ? <i className="fa-solid fa-spinner fa-spin"></i> : '開始分析'}
                                        </button>
                                    </form>
                                    {error && (
                                        <div className="mt-4 p-4 bg-red-500/10 border border-red-500/20 rounded-lg text-red-400 text-sm">
                                            <i className="fa-solid fa-circle-exclamation mr-2"></i>
                                            {error}
                                        </div>
                                    )}
                                </div>

                                {/* Results Section */}
                                {data && (
                                    <div className="space-y-6 animate-fade-in">
                                        {/* Dashboard */}
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            <div className="glass-panel text-center">
                                                <h3 className="text-slate-400 text-sm uppercase tracking-wider mb-2">當前股價</h3>
                                                <div className="text-4xl font-bold text-white mb-1">{data.current_price}</div>
                                                <div className="text-xs text-brand-accent font-mono">{data.stock_code}</div>
                                            </div>
                                            <div className="glass-panel text-center">
                                                <h3 className="text-slate-400 text-sm uppercase tracking-wider mb-2">綜合策略建議</h3>
                                                <div className={`text-3xl font-bold ${data.strategy_summary.includes('BUY') ? 'text-brand-success' : data.strategy_summary.includes('SELL') ? 'text-brand-danger' : 'text-yellow-400'}`}>
                                                    {data.strategy_summary.replace('Comprehensive Strategy: ', '')}
                                                </div>
                                            </div>
                                            <div className="glass-panel text-center">
                                                <h3 className="text-slate-400 text-sm uppercase tracking-wider mb-2">歷史回測回報</h3>
                                                <div className={`text-3xl font-bold ${data.backtest.total_return >= 0 ? 'text-brand-success' : 'text-brand-danger'}`}>
                                                    {data.backtest.total_return > 0 ? '+' : ''}{data.backtest.total_return}%
                                                </div>
                                                <div className="text-xs text-slate-500 font-mono">近兩年累計</div>
                                            </div>
                                        </div>

                                        {/* Indicators */}
                                        <div className="glass-panel">
                                            <h2 className="text-xl font-bold mb-6 flex items-center">
                                                <i className="fa-solid fa-layer-group mr-3 text-brand-accent"></i>
                                                技術指標分析
                                            </h2>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                                    <div className="text-xs text-slate-400 mb-1">RSI (14)</div>
                                                    <div className={`text-xl font-bold ${data.indicators.RSI > 70 ? 'text-red-400' : data.indicators.RSI < 30 ? 'text-green-400' : 'text-white'}`}>
                                                        {data.indicators.RSI}
                                                    </div>
                                                </div>
                                                <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                                    <div className="text-xs text-slate-400 mb-1">MACD</div>
                                                    <div className="text-xl font-bold text-white">{data.indicators.MACD}</div>
                                                </div>
                                                <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                                    <div className="text-xs text-slate-400 mb-1">MACD Signal</div>
                                                    <div className="text-xl font-bold text-white">{data.indicators.MACD_Signal}</div>
                                                </div>
                                                <div className="p-4 bg-white/5 rounded-lg border border-white/5">
                                                    <div className="text-xs text-slate-400 mb-1">MA (5 vs 20)</div>
                                                    <div className="text-xl font-bold text-white">
                                                        {data.indicators.MA_Short} <span className="text-slate-500 text-sm">/</span> {data.indicators.MA_Long}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Backtest Table */}
                                        <div className="glass-panel overflow-hidden">
                                            <h2 className="text-xl font-bold mb-6 flex items-center">
                                                <i className="fa-solid fa-history mr-3 text-brand-accent"></i>
                                                交易歷史回測
                                            </h2>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className="border-b border-white/10 text-slate-400 text-xs uppercase tracking-wider">
                                                            <th className="p-4">日期</th>
                                                            <th className="p-4">價格</th>
                                                            <th className="p-4">行動</th>
                                                            <th className="p-4">原因</th>
                                                            <th className="p-4 text-right">單次收益 %</th>
                                                            <th className="p-4 text-right">累計收益 %</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="text-sm">
                                                        {data.backtest.trades.map((trade, idx) => (
                                                            <tr key={idx} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                                                <td className="p-4 font-mono text-slate-300">{trade.date}</td>
                                                                <td className="p-4 font-mono">{trade.price}</td>
                                                                <td className="p-4">
                                                                    <span className={`px-2 py-1 rounded text-xs font-bold ${trade.action === 'BUY' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                                                                        {trade.action}
                                                                    </span>
                                                                </td>
                                                                <td className="p-4 text-slate-400">{trade.reason}</td>
                                                                <td className={`p-4 text-right font-mono ${trade.return_pct > 0 ? 'text-green-400' : trade.return_pct < 0 ? 'text-red-400' : 'text-slate-500'}`}>
                                                                    {trade.return_pct}%
                                                                </td>
                                                                <td className={`p-4 text-right font-mono ${trade.cumulative_return_pct > 0 ? 'text-green-400' : trade.cumulative_return_pct < 0 ? 'text-red-400' : 'text-slate-500'}`}>
                                                                    {trade.cumulative_return_pct}%
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {data.backtest.trades.length === 0 && (
                                                            <tr>
                                                                <td colSpan="6" className="p-8 text-center text-slate-500">
                                                                    在此期間無交易觸發
                                                                </td>
                                                            </tr>
                                                        )}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        {/* Prompt Gen Helper */}
                                        <div className="glass-panel text-center">
                                            <button
                                                onClick={handleGeneratePrompt}
                                                className="bg-purple-600/20 hover:bg-purple-600/40 text-purple-300 border border-purple-500/30 px-6 py-3 rounded-lg transition-all text-sm font-bold flex items-center justify-center mx-auto"
                                            >
                                                <i className="fa-solid fa-wand-magic-sparkles mr-2"></i>
                                                複製 AI 分析監控 Prompt
                                            </button>
                                            <p className="text-xs text-slate-500 mt-2">點擊複製 Prompt 後，可直接貼上至 ChatGPT 進行 AI 輔助判讀。</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'scanner' && (
                            <div className="animate-fade-in space-y-6">
                                {/* Filters */}
                                <div className="glass-panel flex flex-wrap gap-4 items-end">
                                    <div className="flex-1 min-w-[200px]">
                                        <label className="text-xs text-slate-400 mb-1 block">價格區間 (Min - Max)</label>
                                        <div className="flex gap-2">
                                            <input
                                                type="number"
                                                value={filters.min}
                                                onChange={(e) => setFilters({ ...filters, min: e.target.value })}
                                                className="input-field text-sm py-2"
                                            />
                                            <span className="text-slate-500 self-center">-</span>
                                            <input
                                                type="number"
                                                value={filters.max}
                                                onChange={(e) => setFilters({ ...filters, max: e.target.value })}
                                                className="input-field text-sm py-2"
                                            />
                                        </div>
                                    </div>
                                    <div className="flex-1 min-w-[200px]">
                                        <label className="text-xs text-slate-400 mb-1 block">綜合策略建議</label>
                                        <select
                                            value={filters.strategy}
                                            onChange={(e) => setFilters({ ...filters, strategy: e.target.value })}
                                            className="input-field text-sm py-2"
                                        >
                                            <option value="ALL">全部 (ALL)</option>
                                            <option value="BUY">買入 (BUY)</option>
                                            <option value="SELL">賣出 (SELL)</option>
                                            <option value="HOLD">持有 (HOLD)</option>
                                        </select>
                                    </div>
                                    <button
                                        onClick={handleScan}
                                        disabled={scanLoading}
                                        className="bg-brand-accent hover:bg-sky-400 text-slate-900 font-bold py-2 px-6 rounded-lg transition-all disabled:opacity-50"
                                    >
                                        {scanLoading ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-filter mr-2"></i>}
                                        開始掃描
                                    </button>
                                </div>

                                {/* Results Table */}
                                <div className="glass-panel overflow-hidden">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-bold">掃描結果</h2>
                                        <span className="text-slate-500 text-sm">共 {scanResults.length} 筆</span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="border-b border-white/10 text-slate-400 text-xs uppercase tracking-wider">
                                                    <th className="p-4">代號</th>
                                                    <th className="p-4">名稱</th>
                                                    <th className="p-4">價格</th>
                                                    <th className="p-4">策略建議</th>
                                                    <th className="p-4">RSI</th>
                                                    <th className="p-4">觸發原因</th>
                                                    <th className="p-4 text-right">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {scanResults.map((item, idx) => (
                                                    <tr key={idx} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                                        <td className="p-4 font-mono font-bold text-brand-accent">{item.stock_code}</td>
                                                        <td className="p-4 text-slate-300 font-bold">{item.stock_name}</td>
                                                        <td className="p-4 font-mono">{item.price}</td>
                                                        <td className="p-4">
                                                            <span className={`px-2 py-1 rounded text-xs font-bold ${item.signal === 'BUY' ? 'bg-green-500/20 text-green-400' : item.signal === 'SELL' ? 'bg-red-500/20 text-red-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
                                                                {item.signal}
                                                            </span>
                                                        </td>
                                                        <td className={`p-4 font-mono ${item.rsi > 70 ? 'text-red-400' : item.rsi < 30 ? 'text-green-400' : 'text-slate-400'}`}>
                                                            {item.rsi}
                                                        </td>
                                                        <td className="p-4 text-slate-400 text-xs max-w-xs truncate" title={item.reasons}>
                                                            {item.reasons}
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <button
                                                                onClick={() => loadAnalysisFromScan(item.stock_code)}
                                                                className="text-white hover:text-brand-accent transition-colors"
                                                            >
                                                                <i className="fa-solid fa-arrow-right-to-bracket"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {scanResults.length === 0 && !scanLoading && (
                                                    <tr>
                                                        <td colSpan="6" className="p-8 text-center text-slate-500">
                                                            尚無掃描結果，請調整條件並點擊「開始掃描」
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'volume_monitor' && (
                            <div className="animate-fade-in space-y-6">
                                {/* Configuration */}
                                <div className="glass-panel mb-8">
                                    <form onSubmit={handleVolumeMonitor} className="flex flex-col md:flex-row gap-4 items-end">
                                        <div className="flex-1 min-w-[200px]">
                                            <label className="text-xs text-slate-400 mb-1 block">每分鐘數量門檻</label>
                                            <input
                                                type="number"
                                                value={volumeThreshold}
                                                onChange={(e) => setVolumeThreshold(Number(e.target.value))}
                                                className="input-field py-2"
                                                min="10"
                                            />
                                        </div>
                                        <button
                                            type="submit"
                                            disabled={volumeLoading}
                                            className="bg-brand-accent hover:bg-sky-400 text-slate-900 font-bold py-2 px-8 rounded-lg transition-all disabled:opacity-50"
                                        >
                                            {volumeLoading ? <i className="fa-solid fa-spinner fa-spin mr-2"></i> : <i className="fa-solid fa-play mr-2"></i>}
                                            開始掃描
                                        </button>
                                    </form>
                                    <p className="text-xs text-slate-500 mt-4">
                                        <i className="fa-solid fa-circle-info mr-1"></i>
                                        掃描今日盤中 1 分鐘線。黃燈 🟡 表示達標，紅燈 🔴 表示達標兩倍以上。
                                    </p>
                                </div>

                                {/* Results Table */}
                                <div className="glass-panel overflow-hidden">
                                    <div className="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-xl font-bold">爆量紀錄 (今日)</h2>
                                            <span className="text-slate-500 text-sm bg-white/5 py-1 px-3 rounded-full">
                                                共 {filteredVolumeResults.length} 筆
                                            </span>
                                        </div>
                                        <div className="relative w-full md:w-64">
                                            <input
                                                type="text"
                                                value={volumeFilter}
                                                onChange={(e) => setVolumeFilter(e.target.value)}
                                                placeholder="輸入代號或名稱篩選 (例: 2317)"
                                                className="input-field py-2 pr-10 text-sm"
                                            />
                                            <i className="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                        </div>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="border-b border-white/10 text-slate-400 text-xs uppercase tracking-wider">
                                                    <th className="p-4">時間</th>
                                                    <th className="p-4">代號</th>
                                                    <th className="p-4">名稱</th>
                                                    <th className="p-4">價格</th>
                                                    <th className="p-4">觸發量</th>
                                                    <th className="p-4 text-center">主力動能</th>
                                                    <th className="p-4 text-right">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {filteredVolumeResults.map((item, idx) => (
                                                    <tr key={idx} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                                        <td className="p-4 font-mono text-slate-300">{item.time}</td>
                                                        <td className="p-4 font-mono font-bold text-brand-accent">{item.stock_code}</td>
                                                        <td className="p-4 text-slate-300 font-bold">{item.stock_name}</td>
                                                        <td className="p-4 font-mono">{item.price}</td>
                                                        <td className="p-4 font-mono text-orange-400 font-bold">{item.volume}</td>
                                                        <td className="p-4 text-center font-bold">
                                                            {item.momentum === 'BUY' ? <span className="text-red-500">🔺 買盤強勁</span> : item.momentum === 'SELL' ? <span className="text-green-500">🔻 賣壓沉重</span> : <span className="text-slate-400">➖ 多空僵持</span>}
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <button
                                                                onClick={() => loadAnalysisFromScan(item.stock_code)}
                                                                className="text-white hover:text-brand-accent transition-colors"
                                                            >
                                                                <i className="fa-solid fa-arrow-right-to-bracket"></i>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {filteredVolumeResults.length === 0 && !volumeLoading && (
                                                    <tr>
                                                        <td colSpan="7" className="p-8 text-center text-slate-500">
                                                            尚無爆量紀錄，或沒有符合篩選條件的資料。
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
